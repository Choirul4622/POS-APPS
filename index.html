<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ApplePOS – Sistem Kasir Modern</title>
    <!-- Font Awesome & HTML5 QR -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7; color:#1d1d1f; line-height:1.5;
        }
        .container { max-width:1400px; margin:0 auto; padding:16px; }
        /* Header */
        .header {
            background: rgba(255,255,255,0.98); backdrop-filter: blur(20px);
            border-bottom:1px solid rgba(0,0,0,0.1); position:sticky; top:0; z-index:100;
        }
        .header-content {
            display:flex; justify-content:space-between; align-items:center;
            max-width:1400px; margin:0 auto; padding:12px 16px;
        }
        .logo {
            font-size:24px; font-weight:600;
            background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        /* Grid POS */
        .pos-grid {
            display:grid; grid-template-columns:1fr 380px; gap:20px; margin-top:20px;
        }
        /* Products */
        .products-section {
            background:#fff; border-radius:20px; padding:16px;
            box-shadow:0 4px 20px rgba(0,0,0,0.08);
        }
        .search-wrapper { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .search-bar { flex:1; position:relative; min-width:200px; }
        .search-bar input {
            width:100%; padding:12px 40px 12px 16px; border:1px solid #d2d2d7;
            border-radius:12px; font-size:16px; transition:0.2s;
        }
        .search-bar input:focus { outline:none; border-color:#007aff; box-shadow:0 0 0 4px rgba(0,122,255,0.1); }
        .search-bar i { position:absolute; right:16px; top:50%; transform:translateY(-50%); color:#8e8e93; }
        .category-filter select {
            padding:12px 16px; border:1px solid #d2d2d7; border-radius:12px;
            background:#fff; font-size:16px; cursor:pointer;
        }
        .products-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr));
            gap:12px; max-height:65vh; overflow-y:auto; padding-right:4px;
        }
        .product-card {
            background:#fff; border:1px solid #e5e5ea; border-radius:16px; padding:12px;
            cursor:pointer; transition:0.2s; text-align:center; position:relative;
        }
        .product-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.12); border-color:#007aff; }
        .product-actions { position:absolute; top:8px; right:8px; display:flex; gap:4px; opacity:0; transition:0.2s; }
        .product-card:hover .product-actions { opacity:1; }
        .product-actions button {
            background:rgba(255,255,255,0.9); border:none; border-radius:50%;
            width:28px; height:28px; cursor:pointer; color:#1d1d1f; backdrop-filter:blur(4px);
            display:flex; align-items:center; justify-content:center;
        }
        .product-image {
            width:100%; height:120px; object-fit:cover; border-radius:12px;
            margin-bottom:8px; background:#f5f5f7;
        }
        .product-name { font-weight:500; font-size:14px; margin-bottom:4px; }
        .product-price { color:#007aff; font-weight:600; font-size:16px; }
        .product-stock { font-size:12px; color:#8e8e93; margin-top:4px; }
        /* Cart */
        .cart-section {
            background:#fff; border-radius:20px; padding:16px;
            box-shadow:0 4px 20px rgba(0,0,0,0.08); position:sticky; top:80px; height:fit-content;
        }
        .cart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .cart-items { max-height:350px; overflow-y:auto; margin-bottom:16px; }
        .cart-item {
            display:grid; grid-template-columns:auto 1fr auto auto; gap:8px;
            align-items:center; padding:10px; border-bottom:1px solid #e5e5ea;
        }
        .cart-item-name { font-weight:500; font-size:14px; }
        .cart-item-price { font-size:12px; color:#8e8e93; }
        .cart-item-quantity { display:flex; align-items:center; gap:6px; }
        .quantity-btn {
            width:28px; height:28px; border-radius:6px; border:1px solid #d2d2d7;
            background:#fff; cursor:pointer; font-size:16px;
        }
        .cart-item-subtotal { font-weight:600; min-width:70px; text-align:right; }
        .remove-item { color:#ff3b30; cursor:pointer; padding:4px; }
        .cart-summary { border-top:2px solid #e5e5ea; padding-top:16px; }
        .summary-row { display:flex; justify-content:space-between; margin-bottom:12px; }
        .summary-total { font-size:20px; font-weight:600; color:#007aff; border-top:1px solid #e5e5ea; padding-top:12px; }
        /* Buttons & Forms */
        .btn {
            padding:10px 16px; border-radius:12px; border:none; font-size:15px; font-weight:500;
            cursor:pointer; transition:0.2s; background:#f5f5f7; color:#1d1d1f;
        }
        .btn-primary { background:#007aff; color:#fff; }
        .btn-primary:hover { background:#0051d5; }
        .btn-danger { background:#ff3b30; color:#fff; }
        .btn-sm { padding:6px 12px; font-size:13px; }
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.5); backdrop-filter:blur(8px); z-index:1000;
            align-items:center; justify-content:center;
        }
        .modal-content {
            background:#fff; border-radius:20px; padding:20px; max-width:500px; width:90%;
            max-height:85vh; overflow-y:auto;
        }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; margin-bottom:4px; font-weight:500; }
        .form-group input, .form-group select {
            width:100%; padding:10px; border:1px solid #d2d2d7; border-radius:10px; font-size:15px;
        }
        .badge { display:inline-block; padding:4px 8px; border-radius:20px; font-size:11px; font-weight:500; }
        .badge-success { background:#34c759; color:#fff; }
        .badge-warning { background:#ff9500; color:#fff; }
        .toast {
            position:fixed; bottom:20px; right:20px; background:#1d1d1f; color:#fff;
            padding:12px 20px; border-radius:12px; z-index:2000; animation:slideIn 0.3s;
        }
        @keyframes slideIn { from{opacity:0; transform:translateX(100%);} to{opacity:1; transform:translateX(0);} }
        .loading {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.7); color:#fff; padding:16px 24px;
            border-radius:12px; z-index:2000;
        }
        /* Responsive */
        @media (max-width:768px) {
            .pos-grid { grid-template-columns:1fr; }
            .cart-section { position:static; }
            .header-content { flex-wrap:wrap; gap:8px; }
            .products-grid { grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); }
        }
        /* Tabel untuk manajemen produk & riwayat */
        .table-responsive { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px; text-align:left; border-bottom:1px solid #e5e5ea; }
        th { background:#f5f5f7; font-weight:600; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-content">
        <div class="logo"><i class="fas fa-store"></i> ApplePOS</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn btn-sm" onclick="openProductModal()"><i class="fas fa-plus"></i> Produk</button>
            <button class="btn btn-sm" onclick="openManageProducts()"><i class="fas fa-box"></i> Kelola</button>
            <button class="btn btn-sm" onclick="showSalesHistory()"><i class="fas fa-history"></i> Riwayat</button>
            <button class="btn btn-sm" onclick="showDashboard()"><i class="fas fa-chart-line"></i> Dashboard</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="pos-grid">
        <!-- Products Section -->
        <div class="products-section">
            <div class="search-wrapper">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Cari produk / scan barcode..." onkeyup="searchProducts()">
                    <i class="fas fa-search"></i>
                    <button onclick="openScanner()" style="position:absolute; right:45px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer;">
                        <i class="fas fa-camera" style="color:#007aff;"></i>
                    </button>
                </div>
                <div class="category-filter">
                    <select id="categoryFilter" onchange="filterByCategory()">
                        <option value="">Semua Kategori</option>
                    </select>
                </div>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <!-- Cart Section -->
        <div class="cart-section">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> Keranjang</h3>
                <button class="btn btn-sm" onclick="clearCart()"><i class="fas fa-trash"></i></button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-summary">
                <div class="summary-row"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
                <div class="summary-row">
                    <span>Diskon (%)</span>
                    <input type="number" id="discount" value="0" min="0" max="100" onchange="updateTotal()" style="width:80px; padding:4px; border-radius:6px; border:1px solid #d2d2d7;">
                </div>
                <div class="summary-row">
                    <span>Pajak (%)</span>
                    <input type="number" id="tax" value="10" min="0" onchange="updateTotal()" style="width:80px; padding:4px; border-radius:6px; border:1px solid #d2d2d7;">
                </div>
                <div class="summary-row summary-total"><span>Total</span><span id="grandTotal">Rp 0</span></div>
                <select id="paymentMethod" class="btn" style="width:100%; margin-bottom:12px;">
                    <option value="Tunai">Tunai</option>
                    <option value="Kartu Kredit">Kartu Kredit</option>
                    <option value="QRIS">QRIS</option>
                    <option value="Transfer Bank">Transfer Bank</option>
                </select>
                <button class="btn btn-primary" style="width:100%;" onclick="processPayment()"><i class="fas fa-check-circle"></i> Bayar</button>
            </div>
        </div>
    </div>
</div>

<!-- Scanner Modal -->
<div id="scannerModal" class="modal">
    <div class="modal-content">
        <h3>Scan Barcode</h3>
        <div id="scanner-container" style="width:100%; min-height:250px;"></div>
        <button class="btn" onclick="closeScanner()" style="margin-top:16px;">Tutup</button>
    </div>
</div>

<!-- Product Form Modal (Tambah/Edit) -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h3 id="productModalTitle">Tambah Produk</h3>
        <form id="productForm">
            <input type="hidden" id="productId">
            <div class="form-group">
                <label>Barcode *</label>
                <input type="text" id="productBarcode" required>
            </div>
            <div class="form-group">
                <label>Nama Produk *</label>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label>Harga *</label>
                <input type="number" id="productPrice" min="0" required>
            </div>
            <div class="form-group">
                <label>Stok *</label>
                <input type="number" id="productStock" min="0" required>
            </div>
            <div class="form-group">
                <label>Unit</label>
                <input type="text" id="productUnit" placeholder="pcs, kg, liter" value="pcs">
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <input type="text" id="productCategory" placeholder="Elektronik, Makanan, dll.">
            </div>
            <div class="form-group">
                <label>Gambar</label>
                <input type="file" id="productImage" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Simpan</button>
        </form>
    </div>
</div>

<!-- Manage Products Modal -->
<div id="manageProductsModal" class="modal">
    <div class="modal-content" style="max-width:900px;">
        <h3>Manajemen Produk</h3>
        <div class="table-responsive" id="manageProductsList"></div>
        <button class="btn" onclick="closeManageProducts()" style="margin-top:16px;">Tutup</button>
    </div>
</div>

<!-- Sales History Modal -->
<div id="historyModal" class="modal">
    <div class="modal-content" style="max-width:800px;">
        <h3>Riwayat Transaksi</h3>
        <div class="table-responsive" id="salesHistoryList"></div>
        <button class="btn" onclick="closeHistory()" style="margin-top:16px;">Tutup</button>
    </div>
</div>

<!-- Dashboard Modal -->
<div id="dashboardModal" class="modal">
    <div class="modal-content">
        <h3>Dashboard</h3>
        <div id="dashboardStats"></div>
        <button class="btn" onclick="closeDashboard()" style="margin-top:16px;">Tutup</button>
    </div>
</div>

<script>
    // ==================== KONFIGURASI ====================
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbz2siPsCwftt7x5tdHD3ctUHt0U_q9v5YZswprIxfyUAnpwGZCdlrlxkwOlRGu5iYGWjw/exec'; // Ganti dengan URL Anda

    // State
    let products = [];
    let cart = [];
    let html5QrCode = null;

    // ==================== INISIALISASI ====================
    async function init() {
        showLoading();
        await loadProducts();
        populateCategoryFilter();
        loadCartFromStorage();
        hideLoading();

        // Event listener untuk barcode manual
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                scanBarcodeManually(e.target.value);
            }
        });
    }

    async function loadProducts() {
        try {
            const response = await fetch(`${BACKEND_URL}?action=getProducts`);
            const data = await response.json();
            if (data.success) {
                products = data.products;
                displayProducts(products);
            } else {
                showToast('Gagal memuat produk: ' + data.error, 'error');
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
    }

    function displayProducts(list) {
        const grid = document.getElementById('productsGrid');
        if (!list.length) {
            grid.innerHTML = '<div style="text-align:center; padding:40px;">Produk tidak ditemukan</div>';
            return;
        }
        grid.innerHTML = list.map(p => `
            <div class="product-card" onclick="addToCart(${p.id})">
                <div class="product-actions">
                    <button onclick="event.stopPropagation(); editProduct(${p.id})"><i class="fas fa-edit"></i></button>
                    <button onclick="event.stopPropagation(); deleteProductConfirm(${p.id})"><i class="fas fa-trash"></i></button>
                </div>
                ${p.imageUrl ? `<img src="${p.imageUrl}" class="product-image" alt="${p.name}">` : 
                  `<div class="product-image" style="display:flex; align-items:center; justify-content:center; background:#f5f5f7;">
                     <i class="fas fa-image fa-3x" style="color:#c6c6c8;"></i>
                   </div>`}
                <div class="product-name">${p.name}</div>
                <div class="product-price">Rp ${formatNumber(p.price)}</div>
                <div class="product-stock">
                    <span class="badge ${p.stock > 0 ? 'badge-success' : 'badge-warning'}">
                        Stok: ${p.stock}
                    </span>
                </div>
            </div>
        `).join('');
    }

    function populateCategoryFilter() {
        const categories = [...new Set(products.map(p => p.category).filter(c => c))];
        const select = document.getElementById('categoryFilter');
        select.innerHTML = '<option value="">Semua Kategori</option>' + 
            categories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function filterByCategory() {
        const cat = document.getElementById('categoryFilter').value;
        const filtered = cat ? products.filter(p => p.category === cat) : products;
        displayProducts(filtered);
    }

    function searchProducts() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = products.filter(p => 
            p.name.toLowerCase().includes(keyword) || 
            p.barcode.includes(keyword)
        );
        displayProducts(filtered);
    }

    async function scanBarcodeManually(barcode) {
        if (!barcode) return;
        showLoading();
        try {
            const response = await fetch(`${BACKEND_URL}?action=getProductByBarcode&barcode=${barcode}`);
            const data = await response.json();
            if (data.success && data.product) {
                addToCart(data.product.id);
                document.getElementById('searchInput').value = '';
            } else {
                showToast('Produk tidak ditemukan', 'error');
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
        hideLoading();
    }

    // ==================== KERANJANG ====================
    function addToCart(productId) {
        const product = products.find(p => p.id == productId);
        if (!product) return;
        if (product.stock <= 0) {
            showToast('Stok habis!', 'error');
            return;
        }

        const existing = cart.find(item => item.id == productId);
        const newQty = existing ? existing.quantity + 1 : 1;
        if (newQty > product.stock) {
            showToast('Stok tidak mencukupi!', 'error');
            return;
        }

        if (existing) {
            existing.quantity = newQty;
            existing.subtotal = existing.quantity * existing.price;
        } else {
            cart.push({
                id: product.id,
                name: product.name,
                price: product.price,
                quantity: 1,
                subtotal: product.price
            });
        }

        updateCartDisplay();
        saveCartToStorage();
        showToast(`${product.name} ditambahkan`, 'success');
    }

    function updateCartDisplay() {
        const container = document.getElementById('cartItems');
        if (!cart.length) {
            container.innerHTML = '<div style="text-align:center; padding:30px;">Keranjang kosong</div>';
            updateTotal();
            return;
        }

        container.innerHTML = cart.map(item => `
            <div class="cart-item">
                <div>
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">Rp ${formatNumber(item.price)}</div>
                </div>
                <div class="cart-item-quantity">
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                    <span>${item.quantity}</span>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                </div>
                <div class="cart-item-subtotal">Rp ${formatNumber(item.subtotal)}</div>
                <div class="remove-item" onclick="removeFromCart(${item.id})">
                    <i class="fas fa-trash"></i>
                </div>
            </div>
        `).join('');

        updateTotal();
    }

    async function updateQuantity(productId, newQuantity) {
        const item = cart.find(i => i.id == productId);
        const product = products.find(p => p.id == productId);
        if (!item || !product) return;

        if (newQuantity <= 0) {
            removeFromCart(productId);
            return;
        }

        // Cek stok real-time dari server
        try {
            const response = await fetch(`${BACKEND_URL}?action=checkStock&productId=${productId}`);
            const data = await response.json();
            if (data.success && newQuantity > data.stock) {
                showToast(`Stok hanya tersedia ${data.stock}`, 'error');
                return;
            }
        } catch (e) {
            // fallback ke stok lokal
            if (newQuantity > product.stock) {
                showToast('Stok tidak mencukupi', 'error');
                return;
            }
        }

        item.quantity = newQuantity;
        item.subtotal = item.quantity * item.price;
        updateCartDisplay();
        saveCartToStorage();
    }

    function removeFromCart(productId) {
        cart = cart.filter(item => item.id != productId);
        updateCartDisplay();
        saveCartToStorage();
    }

    function clearCart() {
        if (confirm('Kosongkan keranjang?')) {
            cart = [];
            updateCartDisplay();
            saveCartToStorage();
        }
    }

    function updateTotal() {
        const subtotal = cart.reduce((sum, item) => sum + item.subtotal, 0);
        const discountPercent = parseFloat(document.getElementById('discount').value) || 0;
        const taxPercent = parseFloat(document.getElementById('tax').value) || 0;

        const discount = subtotal * (discountPercent / 100);
        const afterDiscount = subtotal - discount;
        const tax = afterDiscount * (taxPercent / 100);
        const grandTotal = afterDiscount + tax;

        document.getElementById('subtotal').innerText = `Rp ${formatNumber(subtotal)}`;
        document.getElementById('grandTotal').innerText = `Rp ${formatNumber(grandTotal)}`;

        return { subtotal, discount, tax, grandTotal };
    }

    // ==================== PEMBAYARAN ====================
    async function processPayment() {
        if (cart.length === 0) {
            showToast('Keranjang kosong!', 'error');
            return;
        }

        const totals = updateTotal();
        const paymentMethod = document.getElementById('paymentMethod').value;
        const customerName = prompt('Nama pelanggan (opsional):') || 'Walk-in Customer';

        const saleData = {
            customerName: customerName,
            subtotal: totals.subtotal,
            discount: totals.discount,
            tax: totals.tax,
            grandTotal: totals.grandTotal,
            paymentMethod: paymentMethod
        };

        showLoading();
        try {
            const formData = new FormData();
            formData.append('action', 'createSale');
            formData.append('saleData', JSON.stringify(saleData));
            formData.append('items', JSON.stringify(cart));

            const response = await fetch(BACKEND_URL, { method: 'POST', body: formData });
            const data = await response.json();

            if (data.success) {
                showToast(`Transaksi sukses! Invoice: ${data.invoiceNumber}`, 'success');
                printReceipt(data.invoiceNumber, saleData, cart);
                cart = [];
                updateCartDisplay();
                saveCartToStorage();
                await loadProducts(); // Refresh stok
            } else {
                showToast('Gagal: ' + data.error, 'error');
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
        hideLoading();
    }

    function printReceipt(invoiceNumber, saleData, items) {
        const receiptWindow = window.open('', '_blank');
        receiptWindow.document.write(`
            <html><head><title>Struk - ${invoiceNumber}</title>
            <style>body{font-family:monospace;padding:20px;width:300px;margin:0 auto;}.header{text-align:center;margin-bottom:20px;}.item{margin-bottom:8px;}.total{margin-top:16px;border-top:1px dashed #000;padding-top:8px;}.footer{text-align:center;margin-top:20px;font-size:12px;}</style>
            </head><body>
            <div class="header"><h3>ApplePOS</h3><p>${new Date().toLocaleString()}</p><p>Invoice: ${invoiceNumber}</p></div>
            <div class="items">${items.map(item => `<div class="item">${item.name}<br>${item.quantity} x Rp ${formatNumber(item.price)} = Rp ${formatNumber(item.subtotal)}</div>`).join('')}</div>
            <div class="total"><div>Subtotal: Rp ${formatNumber(saleData.subtotal)}</div><div>Diskon: Rp ${formatNumber(saleData.discount)}</div><div>Pajak: Rp ${formatNumber(saleData.tax)}</div><div><strong>Total: Rp ${formatNumber(saleData.grandTotal)}</strong></div><div>Metode: ${saleData.paymentMethod}</div></div>
            <div class="footer"><p>Terima kasih telah berbelanja!</p></div>
            <script>window.print();setTimeout(()=>window.close(),500);<\/script>
            </body></html>
        `);
    }

    // ==================== SCANNER ====================
    function openScanner() {
        document.getElementById('scannerModal').style.display = 'flex';
        html5QrCode = new Html5Qrcode("scanner-container");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start(
            { facingMode: "environment" },
            config,
            (decodedText) => {
                scanBarcodeManually(decodedText);
                closeScanner();
            },
            (error) => {}
        ).catch(err => showToast('Gagal akses kamera: ' + err, 'error'));
    }

    function closeScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('scannerModal').style.display = 'none';
            }).catch(() => {});
        } else {
            document.getElementById('scannerModal').style.display = 'none';
        }
    }

    // ==================== MANAJEMEN PRODUK ====================
    function openProductModal(editProduct = null) {
        const modal = document.getElementById('productModal');
        const title = document.getElementById('productModalTitle');
        const form = document.getElementById('productForm');
        form.reset();

        if (editProduct) {
            title.innerText = 'Edit Produk';
            document.getElementById('productId').value = editProduct.id;
            document.getElementById('productBarcode').value = editProduct.barcode;
            document.getElementById('productName').value = editProduct.name;
            document.getElementById('productPrice').value = editProduct.price;
            document.getElementById('productStock').value = editProduct.stock;
            document.getElementById('productUnit').value = editProduct.unit || 'pcs';
            document.getElementById('productCategory').value = editProduct.category || '';
        } else {
            title.innerText = 'Tambah Produk';
            document.getElementById('productId').value = '';
            document.getElementById('productUnit').value = 'pcs';
        }

        modal.style.display = 'flex';
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const id = document.getElementById('productId').value;
        const barcode = document.getElementById('productBarcode').value.trim();
        const name = document.getElementById('productName').value.trim();
        const price = parseFloat(document.getElementById('productPrice').value);
        const stock = parseInt(document.getElementById('productStock').value);
        const unit = document.getElementById('productUnit').value.trim() || 'pcs';
        const category = document.getElementById('productCategory').value.trim();
        const imageFile = document.getElementById('productImage').files[0];

        let imageUrl = '';

        // Upload gambar jika ada
        if (imageFile) {
            showLoading();
            try {
                const reader = new FileReader();
                imageUrl = await new Promise((resolve, reject) => {
                    reader.onload = async (e) => {
                        const formData = new FormData();
                        formData.append('action', 'uploadImage');
                        formData.append('imageData', e.target.result);
                        formData.append('fileName', Date.now() + '_' + imageFile.name);
                        
                        try {
                            const res = await fetch(BACKEND_URL, { method: 'POST', body: formData });
                            const data = await res.json();
                            if (data.success) {
                                resolve(data.imageUrl);
                            } else {
                                reject(new Error(data.error));
                            }
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = () => reject(new Error('Gagal membaca file'));
                    reader.readAsDataURL(imageFile);
                });
            } catch (err) {
                showToast('Gagal upload gambar: ' + err.message, 'error');
                hideLoading();
                return; // Hentikan submit jika upload gagal
            }
        }

        const formData = new FormData();
        formData.append('action', id ? 'updateProduct' : 'addProduct');
        formData.append('barcode', barcode);
        formData.append('name', name);
        formData.append('price', price);
        formData.append('stock', stock);
        formData.append('unit', unit);
        formData.append('category', category);
        if (imageUrl) formData.append('imageUrl', imageUrl);
        if (id) formData.append('id', id);

        try {
            const response = await fetch(BACKEND_URL, { method: 'POST', body: formData });
            const data = await response.json();
            if (data.success) {
                showToast(`Produk ${id ? 'diupdate' : 'ditambahkan'}!`, 'success');
                document.getElementById('productModal').style.display = 'none';
                await loadProducts();
                populateCategoryFilter();
            } else {
                showToast('Gagal: ' + data.error, 'error');
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
        hideLoading();
    });

    function editProduct(productId) {
        const product = products.find(p => p.id == productId);
        if (product) openProductModal(product);
    }

    async function deleteProductConfirm(productId) {
        if (!confirm('Yakin hapus produk ini?')) return;
        showLoading();
        try {
            const response = await fetch(`${BACKEND_URL}?action=deleteProduct&id=${productId}`);
            const data = await response.json();
            if (data.success) {
                showToast('Produk dihapus', 'success');
                await loadProducts();
                populateCategoryFilter();
            } else {
                showToast('Gagal hapus: ' + data.error, 'error');
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
        hideLoading();
    }

    // Manajemen Produk (Tabel)
    async function openManageProducts() {
        showLoading();
        await loadProducts();
        const listDiv = document.getElementById('manageProductsList');
        listDiv.innerHTML = `
            <table>
                <thead><tr><th>ID</th><th>Barcode</th><th>Nama</th><th>Harga</th><th>Stok</th><th>Kategori</th><th>Aksi</th></tr></thead>
                <tbody>
                    ${products.map(p => `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.barcode}</td>
                            <td>${p.name}</td>
                            <td>Rp ${formatNumber(p.price)}</td>
                            <td>${p.stock}</td>
                            <td>${p.category || '-'}</td>
                            <td>
                                <button class="btn-sm" onclick="editProduct(${p.id}); closeManageProducts();"><i class="fas fa-edit"></i></button>
                                <button class="btn-sm btn-danger" onclick="deleteProductConfirm(${p.id})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
        document.getElementById('manageProductsModal').style.display = 'flex';
        hideLoading();
    }

    function closeManageProducts() {
        document.getElementById('manageProductsModal').style.display = 'none';
    }

    // ==================== RIWAYAT & DASHBOARD ====================
    async function showSalesHistory() {
        showLoading();
        try {
            const response = await fetch(`${BACKEND_URL}?action=getSales`);
            const data = await response.json();
            if (data.success) {
                const sales = data.sales.sort((a,b) => new Date(b.date) - new Date(a.date));
                const historyHtml = `
                    <table>
                        <thead><tr><th>Invoice</th><th>Tanggal</th><th>Pelanggan</th><th>Total</th><th>Metode</th></tr></thead>
                        <tbody>
                            ${sales.map(sale => `
                                <tr>
                                    <td>${sale.invoiceNumber}</td>
                                    <td>${new Date(sale.date).toLocaleString()}</td>
                                    <td>${sale.customerName}</td>
                                    <td>Rp ${formatNumber(sale.grandTotal)}</td>
                                    <td>${sale.paymentMethod}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('salesHistoryList').innerHTML = historyHtml;
                document.getElementById('historyModal').style.display = 'flex';
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
        hideLoading();
    }

    function closeHistory() {
        document.getElementById('historyModal').style.display = 'none';
    }

    async function showDashboard() {
        showLoading();
        try {
            const response = await fetch(`${BACKEND_URL}?action=getDashboardStats`);
            const data = await response.json();
            if (data.success) {
                const stats = data.stats;
                const dashboardHtml = `
                    <div style="display:grid; gap:16px; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));">
                        <div style="background:#f5f5f7; padding:16px; border-radius:12px;">
                            <div style="font-size:14px; color:#8e8e93;">Total Produk</div>
                            <div style="font-size:32px; font-weight:600;">${stats.totalProducts}</div>
                        </div>
                        <div style="background:#f5f5f7; padding:16px; border-radius:12px;">
                            <div style="font-size:14px; color:#8e8e93;">Stok Menipis</div>
                            <div style="font-size:32px; font-weight:600; color:#ff9500;">${stats.lowStock}</div>
                        </div>
                        <div style="background:#f5f5f7; padding:16px; border-radius:12px;">
                            <div style="font-size:14px; color:#8e8e93;">Total Pendapatan</div>
                            <div style="font-size:24px; font-weight:600; color:#34c759;">Rp ${formatNumber(stats.totalRevenue)}</div>
                        </div>
                        <div style="background:#f5f5f7; padding:16px; border-radius:12px;">
                            <div style="font-size:14px; color:#8e8e93;">Penjualan Hari Ini</div>
                            <div style="font-size:24px; font-weight:600;">Rp ${formatNumber(stats.todaySales)}</div>
                        </div>
                        <div style="background:#f5f5f7; padding:16px; border-radius:12px;">
                            <div style="font-size:14px; color:#8e8e93;">Total Transaksi</div>
                            <div style="font-size:32px; font-weight:600;">${stats.totalTransactions}</div>
                        </div>
                    </div>
                `;
                document.getElementById('dashboardStats').innerHTML = dashboardHtml;
                document.getElementById('dashboardModal').style.display = 'flex';
            }
        } catch (error) {
            showToast('Error: ' + error.message, 'error');
        }
        hideLoading();
    }

    function closeDashboard() {
        document.getElementById('dashboardModal').style.display = 'none';
    }

    // ==================== UTILITY ====================
    function formatNumber(num) {
        return new Intl.NumberFormat('id-ID').format(Math.round(num));
    }

    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = type === 'error' ? '#ff3b30' : '#34c759';
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function showLoading() {
        if (document.getElementById('loading')) return;
        const loading = document.createElement('div');
        loading.className = 'loading';
        loading.id = 'loading';
        loading.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
        document.body.appendChild(loading);
    }

    function hideLoading() {
        const loading = document.getElementById('loading');
        if (loading) loading.remove();
    }

    function saveCartToStorage() {
        localStorage.setItem('applepos_cart', JSON.stringify(cart));
    }

    function loadCartFromStorage() {
        const saved = localStorage.getItem('applepos_cart');
        if (saved) {
            try {
                cart = JSON.parse(saved);
                updateCartDisplay();
            } catch (e) {}
        }
    }

    // Tutup modal jika klik di luar konten
    window.onclick = function(event) {
        const modals = document.querySelectorAll('.modal');
        modals.forEach(modal => {
            if (event.target === modal) modal.style.display = 'none';
        });
    }

    // Start
    init();
</script>
</body>
</html>
