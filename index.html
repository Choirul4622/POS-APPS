<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>POS System - Apple Style</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
        }

        /* Apple Style Components */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 12px 0;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Grid Layout */
        .pos-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
            margin-top: 24px;
        }

        /* Products Section */
        .products-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .search-bar {
            margin-bottom: 20px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .search-bar i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e93;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            max-height: 600px;
            overflow-y: auto;
        }

        .product-card {
            background: white;
            border: 1px solid #e5e5ea;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border-color: #007aff;
        }

        .product-image {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
            background: #f5f5f7;
        }

        .product-name {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .product-price {
            color: #007aff;
            font-weight: 600;
            font-size: 16px;
        }

        .product-stock {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 4px;
        }

        /* Cart Section */
        .cart-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 80px;
            height: fit-content;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e5e5ea;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 12px;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #e5e5ea;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 500;
            font-size: 14px;
        }

        .cart-item-price {
            font-size: 12px;
            color: #8e8e93;
        }

        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quantity-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid #d2d2d7;
            background: white;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .quantity-btn:hover {
            background: #f5f5f7;
        }

        .cart-item-subtotal {
            font-weight: 600;
            min-width: 70px;
            text-align: right;
        }

        .remove-item {
            color: #ff3b30;
            cursor: pointer;
            padding: 4px;
        }

        .cart-summary {
            border-top: 2px solid #e5e5ea;
            padding-top: 16px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .summary-total {
            font-size: 20px;
            font-weight: 600;
            color: #007aff;
            border-top: 1px solid #e5e5ea;
            padding-top: 12px;
            margin-top: 8px;
        }

        /* Buttons */
        .btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: #007aff;
            color: white;
        }

        .btn-primary:hover {
            background: #0051d5;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f5f5f7;
            color: #1d1d1f;
        }

        .btn-secondary:hover {
            background: #e5e5ea;
        }

        .btn-danger {
            background: #ff3b30;
            color: white;
        }

        /* Barcode Scanner Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .scanner-container {
            width: 100%;
            margin: 16px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .pos-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-section {
                position: static;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }

        /* Loading & Toast */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            z-index: 2000;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1d1d1f;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-success {
            background: #34c759;
            color: white;
        }

        .badge-warning {
            background: #ff9500;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-store"></i> ApplePOS
            </div>
            <div>
                <button class="btn btn-secondary" onclick="openProductModal()">
                    <i class="fas fa-plus"></i> Produk
                </button>
                <button class="btn btn-secondary" onclick="showSalesHistory()">
                    <i class="fas fa-history"></i> Riwayat
                </button>
                <button class="btn btn-secondary" onclick="showDashboard()">
                    <i class="fas fa-chart-line"></i> Dashboard
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="pos-grid">
            <!-- Products Section -->
            <div class="products-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Cari produk atau scan barcode..." onkeyup="searchProducts()">
                    <i class="fas fa-search"></i>
                </div>
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here -->
                </div>
            </div>

            <!-- Cart Section -->
            <div class="cart-section">
                <div class="cart-header">
                    <h3><i class="fas fa-shopping-cart"></i> Keranjang</h3>
                    <button class="btn btn-secondary" onclick="clearCart()" style="padding: 6px 12px;">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
                <div class="cart-items" id="cartItems">
                    <!-- Cart items will be displayed here -->
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">Rp 0</span>
                    </div>
                    <div class="summary-row">
                        <span>Diskon (%)</span>
                        <input type="number" id="discount" value="0" style="width: 80px; padding: 4px; border-radius: 6px; border: 1px solid #d2d2d7;" onchange="updateTotal()">
                    </div>
                    <div class="summary-row">
                        <span>Pajak (%)</span>
                        <input type="number" id="tax" value="10" style="width: 80px; padding: 4px; border-radius: 6px; border: 1px solid #d2d2d7;" onchange="updateTotal()">
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span id="grandTotal">Rp 0</span>
                    </div>
                    <div class="summary-row">
                        <select id="paymentMethod" class="btn-secondary" style="width: 100%; padding: 12px;">
                            <option value="Tunai">Tunai</option>
                            <option value="Kartu Kredit">Kartu Kredit</option>
                            <option value="QRIS">QRIS</option>
                            <option value="Transfer Bank">Transfer Bank</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" style="width: 100%; margin-top: 12px;" onclick="processPayment()">
                        <i class="fas fa-check-circle"></i> Proses Pembayaran
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Barcode Scanner Modal -->
    <div id="scannerModal" class="modal">
        <div class="modal-content">
            <h3>Scan Barcode</h3>
            <div id="scanner-container" class="scanner-container"></div>
            <button class="btn btn-secondary" onclick="closeScanner()">Tutup</button>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <h3 id="productModalTitle">Tambah Produk</h3>
            <form id="productForm">
                <input type="hidden" id="productId">
                <div style="margin-bottom: 12px;">
                    <label>Barcode *</label>
                    <input type="text" id="productBarcode" required style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #d2d2d7;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label>Nama Produk *</label>
                    <input type="text" id="productName" required style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #d2d2d7;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label>Harga *</label>
                    <input type="number" id="productPrice" required style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #d2d2d7;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label>Stok *</label>
                    <input type="number" id="productStock" required style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #d2d2d7;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label>Unit</label>
                    <input type="text" id="productUnit" placeholder="pcs, kg, liter" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #d2d2d7;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label>Kategori</label>
                    <input type="text" id="productCategory" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #d2d2d7;">
                </div>
                <div style="margin-bottom: 12px;">
                    <label>Gambar</label>
                    <input type="file" id="productImage" accept="image/*">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Simpan</button>
            </form>
        </div>
    </div>

    <!-- Sales History Modal -->
    <div id="historyModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <h3>Riwayat Transaksi</h3>
            <div id="salesHistoryList" style="max-height: 500px; overflow-y: auto;"></div>
            <button class="btn btn-secondary" onclick="closeHistory()" style="margin-top: 16px;">Tutup</button>
        </div>
    </div>

    <!-- Dashboard Modal -->
    <div id="dashboardModal" class="modal">
        <div class="modal-content">
            <h3>Dashboard</h3>
            <div id="dashboardStats"></div>
            <button class="btn btn-secondary" onclick="closeDashboard()" style="margin-top: 16px;">Tutup</button>
        </div>
    </div>

    <script>
        // Konfigurasi
        const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbz2siPsCwftt7x5tdHD3ctUHt0U_q9v5YZswprIxfyUAnpwGZCdlrlxkwOlRGu5iYGWjw/exec'; // Ganti dengan URL Web App Anda
        
        // State
        let products = [];
        let cart = [];
        let html5QrCode = null;
        
        // ==================== INISIALISASI ====================
        async function init() {
            showLoading();
            await loadProducts();
            hideLoading();
            
            // Event listener untuk barcode manual
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    scanBarcodeManually(this.value);
                }
            });
        }
        
        // ==================== FUNGSI PRODUK ====================
        async function loadProducts() {
            try {
                const response = await fetch(`${BACKEND_URL}?action=getProducts`);
                const data = await response.json();
                if (data.success) {
                    products = data.products;
                    displayProducts(products);
                } else {
                    showToast('Gagal memuat produk: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }
        
        function displayProducts(productsToShow) {
            const grid = document.getElementById('productsGrid');
            if (productsToShow.length === 0) {
                grid.innerHTML = '<div style="text-align: center; padding: 40px;">Tidak ada produk</div>';
                return;
            }
            
            grid.innerHTML = productsToShow.map(product => `
                <div class="product-card" onclick="addToCart(${product.id})">
                    ${product.imageUrl ? `<img src="${product.imageUrl}" class="product-image" alt="${product.name}">` : 
                      `<div class="product-image" style="display: flex; align-items: center; justify-content: center; background: #f5f5f7;">
                         <i class="fas fa-image" style="font-size: 48px; color: #c6c6c8;"></i>
                       </div>`}
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">Rp ${formatNumber(product.price)}</div>
                    <div class="product-stock">
                        ${product.stock > 0 ? 
                          `<span class="badge badge-success">Stok: ${product.stock}</span>` : 
                          `<span class="badge badge-warning">Habis</span>`}
                    </div>
                </div>
            `).join('');
        }
        
        function searchProducts() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(keyword) || 
                p.barcode.includes(keyword)
            );
            displayProducts(filtered);
        }
        
        async function scanBarcodeManually(barcode) {
            if (!barcode) return;
            
            showLoading();
            try {
                const response = await fetch(`${BACKEND_URL}?action=getProductByBarcode&barcode=${barcode}`);
                const data = await response.json();
                
                if (data.success && data.product) {
                    addToCart(data.product.id);
                    document.getElementById('searchInput').value = '';
                } else {
                    showToast('Produk tidak ditemukan', 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
            hideLoading();
        }
        
        // ==================== FUNGSI KERANJANG ====================
        function addToCart(productId) {
            const product = products.find(p => p.id == productId);
            if (!product) return;
            
            if (product.stock <= 0) {
                showToast('Stok habis!', 'error');
                return;
            }
            
            const existingItem = cart.find(item => item.id == productId);
            
            if (existingItem) {
                if (existingItem.quantity + 1 > product.stock) {
                    showToast('Stok tidak mencukupi!', 'error');
                    return;
                }
                existingItem.quantity++;
                existingItem.subtotal = existingItem.quantity * existingItem.price;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1,
                    subtotal: product.price
                });
            }
            
            updateCartDisplay();
            showToast(`${product.name} ditambahkan ke keranjang`, 'success');
        }
        
        function updateCartDisplay() {
            const cartContainer = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #8e8e93;">Keranjang kosong</div>';
                document.getElementById('subtotal').innerText = 'Rp 0';
                document.getElementById('grandTotal').innerText = 'Rp 0';
                return;
            }
            
            cartContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">Rp ${formatNumber(item.price)}</div>
                    </div>
                    <div class="cart-item-quantity">
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                        <span>${item.quantity}</span>
                        <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                    </div>
                    <div class="cart-item-subtotal">Rp ${formatNumber(item.subtotal)}</div>
                    <div class="remove-item" onclick="removeFromCart(${item.id})">
                        <i class="fas fa-trash"></i>
                    </div>
                </div>
            `).join('');
            
            updateTotal();
        }
        
        function updateQuantity(productId, newQuantity) {
            const item = cart.find(i => i.id == productId);
            const product = products.find(p => p.id == productId);
            
            if (newQuantity <= 0) {
                removeFromCart(productId);
                return;
            }
            
            if (newQuantity > product.stock) {
                showToast('Stok tidak mencukupi!', 'error');
                return;
            }
            
            item.quantity = newQuantity;
            item.subtotal = item.quantity * item.price;
            updateCartDisplay();
        }
        
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id != productId);
            updateCartDisplay();
        }
        
        function clearCart() {
            if (confirm('Hapus semua item dari keranjang?')) {
                cart = [];
                updateCartDisplay();
            }
        }
        
        function updateTotal() {
            const subtotal = cart.reduce((sum, item) => sum + item.subtotal, 0);
            const discountPercent = parseFloat(document.getElementById('discount').value) || 0;
            const taxPercent = parseFloat(document.getElementById('tax').value) || 0;
            
            const discount = subtotal * (discountPercent / 100);
            const afterDiscount = subtotal - discount;
            const tax = afterDiscount * (taxPercent / 100);
            const grandTotal = afterDiscount + tax;
            
            document.getElementById('subtotal').innerText = `Rp ${formatNumber(subtotal)}`;
            document.getElementById('grandTotal').innerText = `Rp ${formatNumber(grandTotal)}`;
            
            return { subtotal, discount, tax, grandTotal };
        }
        
        // ==================== FUNGSI PEMBAYARAN ====================
        async function processPayment() {
            if (cart.length === 0) {
                showToast('Keranjang kosong!', 'error');
                return;
            }
            
            const totals = updateTotal();
            const paymentMethod = document.getElementById('paymentMethod').value;
            const customerName = prompt('Nama pelanggan (opsional):') || 'Walk-in Customer';
            
            const saleData = {
                customerName: customerName,
                subtotal: totals.subtotal,
                discount: totals.discount,
                tax: totals.tax,
                grandTotal: totals.grandTotal,
                paymentMethod: paymentMethod
            };
            
            showLoading();
            try {
                const formData = new FormData();
                formData.append('action', 'createSale');
                formData.append('saleData', JSON.stringify(saleData));
                formData.append('items', JSON.stringify(cart));
                
                const response = await fetch(`${BACKEND_URL}?action=createSale`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(`Transaksi berhasil! Invoice: ${data.invoiceNumber}`, 'success');
                    printReceipt(data.invoiceNumber, saleData, cart);
                    cart = [];
                    updateCartDisplay();
                    await loadProducts(); // Refresh stok
                } else {
                    showToast('Gagal memproses: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
            hideLoading();
        }
        
        function printReceipt(invoiceNumber, saleData, items) {
            const receiptWindow = window.open('', '_blank');
            receiptWindow.document.write(`
                <html>
                <head>
                    <title>Struk - ${invoiceNumber}</title>
                    <style>
                        body { font-family: monospace; padding: 20px; width: 300px; margin: 0 auto; }
                        .header { text-align: center; margin-bottom: 20px; }
                        .item { margin-bottom: 8px; }
                        .total { margin-top: 16px; border-top: 1px dashed #000; padding-top: 8px; }
                        .footer { text-align: center; margin-top: 20px; font-size: 12px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h3>ApplePOS</h3>
                        <p>${new Date().toLocaleString()}</p>
                        <p>Invoice: ${invoiceNumber}</p>
                    </div>
                    <div class="items">
                        ${items.map(item => `
                            <div class="item">
                                ${item.name}<br>
                                ${item.quantity} x Rp ${formatNumber(item.price)} = Rp ${formatNumber(item.subtotal)}
                            </div>
                        `).join('')}
                    </div>
                    <div class="total">
                        <div>Subtotal: Rp ${formatNumber(saleData.subtotal)}</div>
                        <div>Diskon: Rp ${formatNumber(saleData.discount)}</div>
                        <div>Pajak: Rp ${formatNumber(saleData.tax)}</div>
                        <div><strong>Total: Rp ${formatNumber(saleData.grandTotal)}</strong></div>
                        <div>Metode: ${saleData.paymentMethod}</div>
                    </div>
                    <div class="footer">
                        <p>Terima kasih telah berbelanja!</p>
                    </div>
                    <script>window.print();setTimeout(()=>window.close(),500);<\/script>
                </body>
                </html>
            `);
        }
        
        // ==================== FUNGSI SCANNER ====================
        function openScanner() {
            document.getElementById('scannerModal').style.display = 'flex';
            
            html5QrCode = new Html5Qrcode("scanner-container");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                (decodedText) => {
                    scanBarcodeManually(decodedText);
                    closeScanner();
                },
                (error) => {}
            ).catch(err => {
                showToast('Gagal mengakses kamera: ' + err, 'error');
            });
        }
        
        function closeScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerModal').style.display = 'none';
                }).catch(() => {});
            } else {
                document.getElementById('scannerModal').style.display = 'none';
            }
        }
        
        // ==================== FUNGSI MANAJEMEN PRODUK ====================
        function openProductModal(editProduct = null) {
            const modal = document.getElementById('productModal');
            const title = document.getElementById('productModalTitle');
            
            if (editProduct) {
                title.innerText = 'Edit Produk';
                document.getElementById('productId').value = editProduct.id;
                document.getElementById('productBarcode').value = editProduct.barcode;
                document.getElementById('productName').value = editProduct.name;
                document.getElementById('productPrice').value = editProduct.price;
                document.getElementById('productStock').value = editProduct.stock;
                document.getElementById('productUnit').value = editProduct.unit || '';
                document.getElementById('productCategory').value = editProduct.category || '';
            } else {
                title.innerText = 'Tambah Produk';
                document.getElementById('productForm').reset();
                document.getElementById('productId').value = '';
            }
            
            modal.style.display = 'flex';
        }
        
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('productId').value;
            const barcode = document.getElementById('productBarcode').value;
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const stock = document.getElementById('productStock').value;
            const unit = document.getElementById('productUnit').value;
            const category = document.getElementById('productCategory').value;
            const imageFile = document.getElementById('productImage').files[0];
            
            let imageUrl = '';
            
            showLoading();
            
            // Upload image if exists
            if (imageFile) {
                const reader = new FileReader();
                imageUrl = await new Promise((resolve) => {
                    reader.onload = async (e) => {
                        const formData = new FormData();
                        formData.append('action', 'uploadImage');
                        formData.append('imageData', e.target.result);
                        formData.append('fileName', Date.now() + '_' + imageFile.name);
                        
                        const response = await fetch(`${BACKEND_URL}?action=uploadImage`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        resolve(data.success ? data.imageUrl : '');
                    };
                    reader.readAsDataURL(imageFile);
                });
            }
            
            const formData = new FormData();
            formData.append('action', id ? 'updateProduct' : 'addProduct');
            formData.append('barcode', barcode);
            formData.append('name', name);
            formData.append('price', price);
            formData.append('stock', stock);
            formData.append('unit', unit);
            formData.append('category', category);
            if (imageUrl) formData.append('imageUrl', imageUrl);
            if (id) formData.append('id', id);
            
            try {
                const response = await fetch(`${BACKEND_URL}?action=${id ? 'updateProduct' : 'addProduct'}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast(`Produk ${id ? 'diupdate' : 'ditambahkan'}!`, 'success');
                    document.getElementById('productModal').style.display = 'none';
                    await loadProducts();
                } else {
                    showToast('Gagal: ' + data.error, 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
            hideLoading();
        });
        
        // ==================== FUNGSI RIWAYAT & DASHBOARD ====================
        async function showSalesHistory() {
            showLoading();
            try {
                const response = await fetch(`${BACKEND_URL}?action=getSales`);
                const data = await response.json();
                
                if (data.success) {
                    const historyHtml = `
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr><th>Invoice</th><th>Tanggal</th><th>Total</th><th>Metode</th></tr>
                            </thead>
                            <tbody>
                                ${data.sales.map(sale => `
                                    <tr style="border-bottom: 1px solid #e5e5ea;">
                                        <td style="padding: 8px;">${sale.invoiceNumber}</td>
                                        <td style="padding: 8px;">${new Date(sale.date).toLocaleDateString()}</td>
                                        <td style="padding: 8px;">Rp ${formatNumber(sale.grandTotal)}</td>
                                        <td style="padding: 8px;">${sale.paymentMethod}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    document.getElementById('salesHistoryList').innerHTML = historyHtml;
                    document.getElementById('historyModal').style.display = 'flex';
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
            hideLoading();
        }
        
        async function showDashboard() {
            showLoading();
            try {
                const response = await fetch(`${BACKEND_URL}?action=getDashboardStats`);
                const data = await response.json();
                
                if (data.success) {
                    const stats = data.stats;
                    const dashboardHtml = `
                        <div style="display: grid; gap: 16px;">
                            <div style="background: #f5f5f7; padding: 16px; border-radius: 12px;">
                                <div style="font-size: 14px; color: #8e8e93;">Total Produk</div>
                                <div style="font-size: 32px; font-weight: 600;">${stats.totalProducts}</div>
                            </div>
                            <div style="background: #f5f5f7; padding: 16px; border-radius: 12px;">
                                <div style="font-size: 14px; color: #8e8e93;">Stok Menipis (<10)</div>
                                <div style="font-size: 32px; font-weight: 600; color: #ff9500;">${stats.lowStock}</div>
                            </div>
                            <div style="background: #f5f5f7; padding: 16px; border-radius: 12px;">
                                <div style="font-size: 14px; color: #8e8e93;">Total Pendapatan</div>
                                <div style="font-size: 32px; font-weight: 600; color: #34c759;">Rp ${formatNumber(stats.totalRevenue)}</div>
                            </div>
                            <div style="background: #f5f5f7; padding: 16px; border-radius: 12px;">
                                <div style="font-size: 14px; color: #8e8e93;">Penjualan Hari Ini</div>
                                <div style="font-size: 32px; font-weight: 600;">Rp ${formatNumber(stats.todaySales)}</div>
                            </div>
                            <div style="background: #f5f5f7; padding: 16px; border-radius: 12px;">
                                <div style="font-size: 14px; color: #8e8e93;">Total Transaksi</div>
                                <div style="font-size: 32px; font-weight: 600;">${stats.totalTransactions}</div>
                            </div>
                        </div>
                    `;
                    document.getElementById('dashboardStats').innerHTML = dashboardHtml;
                    document.getElementById('dashboardModal').style.display = 'flex';
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
            hideLoading();
        }
        
        function closeHistory() {
            document.getElementById('historyModal').style.display = 'none';
        }
        
        function closeDashboard() {
            document.getElementById('dashboardModal').style.display = 'none';
        }
        
        // ==================== UTILITY FUNCTIONS ====================
        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID').format(Math.round(num));
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'error' ? '#ff3b30' : '#34c759';
            toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading() {
            const loading = document.createElement('div');
            loading.className = 'loading';
            loading.id = 'loading';
            loading.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';
            document.body.appendChild(loading);
        }
        
        function hideLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }
        
        // Tambahkan tombol scanner di search bar
        document.querySelector('.search-bar').innerHTML += `
            <button onclick="openScanner()" style="position: absolute; right: 50px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;">
                <i class="fas fa-camera" style="font-size: 20px; color: #007aff;"></i>
            </button>
        `;
        
        // Start app
        init();
    </script>
</body>
</html>
